# ============================================
# HYPRLAND CONFIG
# ============================================

$mainMod     = SUPER
$terminal    = kitty
$fileManager = dolphin

# ============================================
# MONITOR
# ============================================
monitor = ,preferred,auto,1

# ============================================
# AUTOSTART
# ============================================
exec-once = quickshell -p ~/.config/hypr/quickshell
exec-once = awww-daemon
exec-once = hypridle
exec-once = dunst -conf ~/.config/hypr/dunst/dunstrc
exec-once = bash -c '/usr/lib/polkit-kde-authentication-agent-1 || /usr/libexec/polkit-kde-authentication-agent-1 || /usr/lib/polkit-1/polkitd'
exec-once = wl-paste --type text --watch cliphist store
exec-once = bash ~/.config/hypr/scripts/wallpaper.sh

# ============================================
# ENVIRONMENT
# ============================================
env = HYPRCURSOR_THEME,phinger-cursors-dark
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = GTK_THEME,Gruvbox-Dark
env = QT_STYLE_OVERRIDE,kvantum

# ============================================
# SOURCES
# ============================================
source = ~/.config/hypr/hypr-colors-clean.conf
source = ~/.config/hypr/rules.conf

# ============================================
# LOOK & FEEL
# ============================================
general {
    gaps_in             = 4
    gaps_out            = 10
    border_size         = 2
    col.active_border   = $color6 $color4 45deg
    col.inactive_border = $color0
    resize_on_border    = true
    layout              = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled           = true
        size              = 6
        passes            = 3
        new_optimizations = true
        xray              = false
        ignore_opacity    = true
    }

        shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(00000088)
    }

    inactive_opacity = 0.92
    active_opacity   = 1.0
}

gesture = 4, horizontal, workspace

# ============================================
# ANIMATIONS
# ============================================
animations {
    enabled = yes

    # Bezier Curves
    bezier = macEase, 0.22, 1, 0.36, 1
    bezier = macFade, 0.25, 1, 0.5, 1
    bezier = macSmooth, 0.2, 0.8, 0.2, 1

    # Windows
    animation = windows, 1, 5, macEase
    animation = windowsIn, 1, 5, macEase, slide
    animation = windowsOut, 1, 4, macFade, popin 87%

    # Fade
    animation = fade, 1, 5, macFade
    animation = layers, 1, 4, macSmooth
    animation = border, 1, 8, default
    animation = borderangle, 1, 8, default

    # Workspace Movement
    animation = workspaces, 1, 4, macEase, slide

    # Special Workspace
    animation = specialWorkspace, 1, 5, macEase, slidefade
}

# ============================================
# INPUT
# ============================================
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = true
    }
}

# ============================================
# LAYOUT
# ============================================
dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}

# ============================================
# WINDOW RULES
# ============================================

# Blur for Layershell (Quickshell Bar)
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.2, match:namespace quickshell

# ============================================
# KEYBINDS
# ============================================

# Apps
bind = $mainMod, T,       exec, $terminal
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/scratchpad.sh
bind = $mainMod, E,       exec, $fileManager
bind = $mainMod, D,       exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-launcher handle
bind = $mainMod, G,       exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-filebrowser handle
bind = $mainMod, F,       exec, zen-browser

# Quickshell Modules
bind = $mainMod ALT, P, exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-process handle    # Process Manager
bind = $mainMod, F1,    exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-cheatsheet handle # Keybind Cheatsheet
bind = $mainMod, N,     exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-notif handle      # Notifications
bind = $mainMod, V,     exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-clipboard handle  # Clipboard
bind = $mainMod, Z,     exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-notepad handle    # Notepad (Note + Todo)
bind = $mainMod, I,     exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-rules handle      # Window Rules

# Window Management
bind = $mainMod, Q,       killactive
bind = $mainMod, X,       togglefloating
bind = $mainMod, P,       pseudo
bind = $mainMod, J,       layoutmsg, togglesplit
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, W,       exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-wallpaper handle
bind = $mainMod, R,       exec, ~/.config/hypr/scripts/reload.sh

# Screenshot
bind = , Print, exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-screenshot handle

# Lock & Exit
bind = $mainMod, L,       exec, hyprlock
bind = $mainMod, Escape,  exec, quickshell ipc -p ~/.config/hypr/quickshell call toggle-power handle

# Focus
bind = $mainMod, left,   movefocus, l
bind = $mainMod, right,  movefocus, r
bind = $mainMod, up,     movefocus, u
bind = $mainMod, down,   movefocus, d

# Move Window
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize
binde = $mainMod ALT, left,  resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive,  40 0
binde = $mainMod ALT, up,    resizeactive,  0 -40
binde = $mainMod ALT, down,  resizeactive,  0  40

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Workspace Scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/Resize with Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume & Brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ && quickshell ipc -p ~/.config/hypr/quickshell call show-volume-osd handle $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}') false
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%- && quickshell ipc -p ~/.config/hypr/quickshell call show-volume-osd handle $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}') false
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && quickshell ipc -p ~/.config/hypr/quickshell call show-volume-osd handle $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}') $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && echo true || echo false)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+ && quickshell ipc -p ~/.config/hypr/quickshell call show-brightness-osd handle $(brightnessctl get | awk -v max=$(brightnessctl max) '{print int($1*100/max)}')
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && quickshell ipc -p ~/.config/hypr/quickshell call show-brightness-osd handle $(brightnessctl get | awk -v max=$(brightnessctl max) '{print int($1*100/max)}')
bind  = ,  XF86AudioPlay,         exec, playerctl play-pause
bind  = ,  XF86AudioNext,         exec, playerctl next
bind  = ,  XF86AudioPrev,         exec, playerctl previous
