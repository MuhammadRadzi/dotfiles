# ============================================
# HYPRLAND CONFIG — murasa
# ============================================

$mainMod     = SUPER
$terminal    = kitty
$fileManager = dolphin
$menu        = rofi -show drun -config ~/.config/hypr/rofi/config.rasi

# ============================================
# MONITOR
# ============================================
monitor = ,preferred,auto,1

# ============================================
# AUTOSTART
# ============================================
exec-once = quickshell -p ~/.config/hypr/quickshell
exec-once = awww-daemon
exec-once = awww img ~/.config/hypr/assets/wallpapers/default.jpg
exec-once = hypridle
exec-once = dunst -conf ~/.config/hypr/dunst/dunstrc
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ============================================
# ENVIRONMENT
# ============================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1

# ============================================
# LOOK & FEEL
# ============================================
general {
    gaps_in             = 4
    gaps_out            = 8
    border_size         = 2
    col.active_border   = rgba(ffffffff) rgba(888888ff) 45deg
    col.inactive_border = rgba(2a2a2aff)
    resize_on_border    = true
    layout              = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled           = true
        size              = 6
        passes            = 3
        new_optimizations = true
        xray              = false
        ignore_opacity    = true
    }

        shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(00000088)
    }

    inactive_opacity = 0.92
    active_opacity   = 1.0
}

gesture = 4, vertical, workspace

# ============================================
# ANIMASI
# ============================================
animations {
    enabled = true

    bezier = easeOut,    0.16, 1, 0.3, 1
    bezier = easeInOut,  0.87, 0, 0.13, 1
    bezier = spring,     0.68, -0.55, 0.27, 1.55

    animation = windows,     1, 4,  spring,  popin 80%
    animation = windowsOut,  1, 3,  easeOut, popin 80%
    animation = border,      1, 8,  easeOut
    animation = fade,        1, 4,  easeOut
    animation = workspaces,  1, 4,  easeInOut, slidevert
}

# ============================================
# INPUT
# ============================================
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = true
    }
}

# ============================================
# LAYOUT
# ============================================
dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}

# ============================================
# WINDOW RULES
# ============================================
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(dolphin)$, float on, center on, size 900 600

# Blur untuk layershell (quickshell bar)
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.2, match:namespace quickshell

# ============================================
# KEYBINDS
# ============================================

# Apps
bind = $mainMod, T,      exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, D,     exec, rofi -show drun -config ~/.config/hypr/rofi/config.rasi
bind = $mainMod, G,     exec, rofi -show filebrowser -config ~/.config/hypr/rofi/config.rasi
bind = $mainMod, F,      exec, zen-browser

# Window management
bind = $mainMod, Q,      killactive
bind = $mainMod, X,      togglefloating
bind = $mainMod, P,      pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, F,      fullscreen

# Lock & exit
bind = $mainMod, L,      exec, hyprlock
bind = $mainMod SHIFT, M, exec, hyprctl dispatch exit

# Screenshot
bind = ,         Print,  exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod, Print,  exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Clipboard history
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -config ~/.config/hypr/rofi/config.rasi | cliphist decode | wl-copy

# Focus
bind = $mainMod, left,   movefocus, l
bind = $mainMod, right,  movefocus, r
bind = $mainMod, up,     movefocus, u
bind = $mainMod, down,   movefocus, d

# Move window
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize
binde = $mainMod ALT, left,  resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive,  40 0
binde = $mainMod ALT, up,    resizeactive,  0 -40
binde = $mainMod ALT, down,  resizeactive,  0  40

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move window ke workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scroll workspace
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize dengan mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume & brightness
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioPlay,         exec, playerctl play-pause
bind  = , XF86AudioNext,         exec, playerctl next
bind  = , XF86AudioPrev,         exec, playerctl previous
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-