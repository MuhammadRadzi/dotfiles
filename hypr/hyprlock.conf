general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/.config/hypr/assets/wallpapers/default.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

# Clock - paling atas
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 160
    halign = center
    valign = center
}

# Tanggal
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Avatar
image {
    monitor =
    path = /var/lib/AccountsService/icons/murasa
    size = 90
    rounding = -1
    border_size = 3
    border_color = rgba(255, 255, 255, 0.6)
    position = 0, -10
    halign = center
    valign = center
}

# Nama user
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.9)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -110
    halign = center
    valign = center
}

# Input password
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(255, 255, 255, 0.8)
    fail_color = rgba(255, 80, 80, 0.8)
    fail_text = <i>Wrong password</i>
    position = 0, -185
    halign = center
    valign = center
}