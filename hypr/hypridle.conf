general {
    lock_cmd = quickshell -p ~/.config/hypr/quickshell/lock
    before_sleep_cmd = quickshell -p ~/.config/hypr/quickshell/lock
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

listener {
    timeout = 300
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

listener {
    timeout = 360
    on-timeout = quickshell -p ~/.config/hypr/quickshell/lock
}

listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}